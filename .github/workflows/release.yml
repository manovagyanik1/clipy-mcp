name: Release

# Tag-driven GitHub Releases: pushing a tag `v*` builds the package (as a sanity
# check) and creates a GitHub Release with generated notes.
# npm publishing is handled separately by publish.yml.

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - name: GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
